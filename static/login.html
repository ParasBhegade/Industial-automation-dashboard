<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Automation Dashboard</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-container">
    <!-- LEFT BLUE PANEL -->
    <div class="login-left">
      <div class="logo-area">
        <h1>AUTOMATION<br>DASHBOARD</h1>
        <p class="tagline">“Data-driven intelligence for tomorrow’s industry.”</p>
        <img src="login_logo.png" alt="Automation Dashboard Graphic" class="side-img" />
      </div>
      <a href="home.html" class="home-btn">HOME</a>
    </div>

    <!-- RIGHT WHITE PANEL -->
    <div class="login-right">
      <h2 class="form-title">SIGN IN</h2>

      <form class="login-form" id="loginForm">
        <div class="input-group">
          <label for="email">EMAIL</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="input-group password-group">
          <label for="password">PASSWORD</label>
          <input type="password" id="password" placeholder="Enter your password" required />
          <span id="togglePassword" class="toggle-icon">👁️</span>
        </div>

        <div class="options">
          <a href="#" class="forgot">Forgot password?</a>
          <label class="remember"><input type="checkbox" /> Remember me</label>
        </div>

        <div class="btn-row">
          <button type="submit" class="btn primary">SIGN IN</button>
          <a href="register.html" class="btn outline">REGISTER</a>
        </div>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
